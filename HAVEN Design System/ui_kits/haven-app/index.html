<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAVEN — App UI Kit</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: #0D1810;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .header {
    text-align: center;
  }
  .header .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: white;
    letter-spacing: -0.02em;
  }
  .header p {
    font-size: 13px;
    color: rgba(255,255,255,.45);
    margin-top: 4px;
  }
  .phone-wrap {
    position: relative;
    width: 375px;
    height: 780px;
    border-radius: 48px;
    overflow: hidden;
    background: white;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.1),
      0 40px 80px rgba(0,0,0,.6),
      0 0 0 10px #1a1a2e,
      0 0 0 12px rgba(255,255,255,.06);
  }
  .screen-tabs {
    display: flex;
    gap: 6px;
    background: rgba(255,255,255,.07);
    padding: 5px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.1);
  }
  .screen-tab {
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    transition: all .2s;
    color: rgba(255,255,255,.5);
    background: transparent;
  }
  .screen-tab.active {
    background: white;
    color: #0F0A1E;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="FeedScreen.jsx"></script>
<script type="text/babel" src="GrowScreen.jsx"></script>
<script type="text/babel" src="SafeSpaceScreen.jsx"></script>
<script type="text/babel" src="CircleScreen.jsx"></script>

<script type="text/babel">
const SCREENS = ['feed', 'grow', 'circle', 'safe_space', 'profile'];
const LABELS = { feed: 'Feed', grow: 'Grow', circle: 'Circle', safe_space: 'Safe Space', profile: 'Profile' };

function ProfileScreen() {
  const skills = ['Python', 'Design', 'Data Analysis'];
  const badges = ['🏆 First Post', '🌱 Level 3', '⭕ Circle Joiner', '🔗 Volunteer'];
  return (
    <div style={{ height: '100%', overflowY: 'auto', background: C.gray50 }}>
      {/* Cover */}
      <div style={{ height: 100, background: 'linear-gradient(135deg, #3C6142 0%, #7FAD82 100%)' }} />
      <div style={{ padding: '0 16px', marginTop: -32, marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ width: 64, height: 64, borderRadius: '50%', background: C.primaryBadge, color: C.primaryText, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26, fontWeight: 600, border: '3px solid white', boxShadow: '0 2px 8px rgba(0,0,0,.1)' }}>H</div>
          <button style={{ background: 'white', border: `1.5px solid ${C.gray200}`, borderRadius: 10, padding: '6px 14px', fontSize: 12, fontWeight: 500, color: C.gray700, cursor: 'pointer', fontFamily: 'inherit' }}>Edit Profile</button>
        </div>
        <div style={{ fontSize: 18, fontWeight: 600, color: C.gray900 }}>Hafiz Rahman</div>
        <div style={{ fontSize: 13, color: C.gray500 }}>@hafiz_codes · UTM, Johor Bahru</div>
        <div style={{ fontSize: 13, color: C.gray700, marginTop: 8, lineHeight: 1.6 }}>Building things with code & design. SPM 2022, now CS @ UTM. Passionate about making tech accessible for all Malaysians.</div>
        <div style={{ display: 'flex', gap: 16, marginTop: 10 }}>
          <div><span style={{ fontSize: 14, fontWeight: 600, color: C.gray900 }}>780</span><span style={{ fontSize: 12, color: C.gray500 }}> XP</span></div>
          <div><span style={{ fontSize: 14, fontWeight: 600, color: C.gray900 }}>Level 4</span></div>
          <div><span style={{ fontSize: 14, fontWeight: 600, color: C.gray900 }}>23</span><span style={{ fontSize: 12, color: C.gray500 }}> posts</span></div>
        </div>
      </div>

      <div style={{ padding: '0 12px 80px' }}>
        <Card style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', color: C.gray400, marginBottom: 8 }}>Skills</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {skills.map(s => <span key={s} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: C.purpleBadge, color: C.purpleText, fontSize: 12, fontWeight: 500, padding: '4px 10px', borderRadius: 8 }}><CheckIcon size={11} color={C.purpleText}/>{s}</span>)}
          </div>
        </Card>
        <Card>
          <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', color: C.gray400, marginBottom: 8 }}>Badges</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {badges.map(b => <span key={b} style={{ fontSize: 12, padding: '4px 10px', background: C.gray100, borderRadius: 8, color: C.gray700 }}>{b}</span>)}
          </div>
        </Card>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState(() => {
    try { return localStorage.getItem('haven-screen') || 'feed'; } catch { return 'feed'; }
  });

  const nav = (s) => {
    setScreen(s);
    try { localStorage.setItem('haven-screen', s); } catch {}
  };

  const screenEl = {
    feed:       <FeedScreen onNav={nav} />,
    grow:       <GrowScreen />,
    circle:     <CircleScreen />,
    safe_space: <SafeSpaceScreen />,
    profile:    <ProfileScreen />,
  }[screen] || <FeedScreen onNav={nav} />;

  return (
    <div className="stage">
      <div className="header">
        <div className="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7FAD82" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/>
            <path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
            <path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
          </svg>
          <h1>HAVEN</h1>
        </div>
        <p>Mobile App UI Kit · Geist Sans · Lucide Icons</p>
      </div>

      {/* Screen picker */}
      <div className="screen-tabs">
        {SCREENS.map(s => (
          <button key={s} className={`screen-tab ${screen === s ? 'active' : ''}`} onClick={() => nav(s)}>
            {LABELS[s]}
          </button>
        ))}
      </div>

      {/* Phone */}
      <div className="phone-wrap">
        {/* Status bar */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 100, height: 44, background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', width: 120, height: 26, background: '#000', borderRadius: 20, zIndex: 10 }} />
          <div style={{ position: 'absolute', left: 16, fontSize: 12, fontWeight: 600, color: '#111', fontFamily: '-apple-system, system-ui' }}>9:41</div>
          <div style={{ position: 'absolute', right: 16, display: 'flex', gap: 6, alignItems: 'center' }}>
            <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="2.5" height="4" rx=".5" fill="#111"/><rect x="4" y="4" width="2.5" height="6" rx=".5" fill="#111"/><rect x="8" y="2" width="2.5" height="8" rx=".5" fill="#111"/><rect x="12" y="0" width="2.5" height="10" rx=".5" fill="#111"/></svg>
            <svg width="22" height="10" viewBox="0 0 22 10"><rect x=".5" y=".5" width="18" height="9" rx="2.5" stroke="#111" strokeOpacity=".35" fill="none"/><rect x="2" y="2" width="15" height="6" rx="1.5" fill="#111"/><path d="M20 3.5v3c.6-.3 1-.9 1-1.5s-.4-1.2-1-1.5z" fill="#111" fillOpacity=".4"/></svg>
          </div>
        </div>

        {/* Screen content */}
        <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, display: 'flex', flexDirection: 'column' }}>
          <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
            {screenEl}
          </div>
          <HavenBottomNav active={screen} onNav={nav} />
        </div>

        {/* Home indicator */}
        <div style={{ position: 'absolute', bottom: 6, left: '50%', transform: 'translateX(-50%)', width: 120, height: 4, borderRadius: 2, background: 'rgba(0,0,0,.18)', zIndex: 200 }} />
      </div>

      <p style={{ fontSize: 11, color: 'rgba(255,255,255,.2)', textAlign: 'center', maxWidth: 340 }}>
        Click screen names above to navigate · Components are interactive
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

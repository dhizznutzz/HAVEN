<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: white; font-family: var(--font-sans); }
  h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #999; margin: 0 0 8px; }

  /* Top nav */
  .topnav { display: flex; align-items: center; height: 56px; border-bottom: 1px solid #F3F4F6; padding: 0 20px; gap: 8px; background: white; border-radius: 12px; }
  .nav-logo { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: #111827; margin-right: 16px; }
  .nav-link { padding: 6px 10px; border-radius: 8px; font-size: 13px; color: #6B7280; cursor: pointer; }
  .nav-link.active { background: #F5F3FF; color: #4C1D95; font-weight: 500; }
  .nav-actions { margin-left: auto; display: flex; gap: 4px; align-items: center; }
  .icon-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #9CA3AF; cursor: pointer; }
  .avatar-sm { width: 30px; height: 30px; border-radius: 50%; background: #EDE9FE; color: #4C1D95; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }

  /* Bottom nav */
  .bottomnav { display: flex; height: 64px; border-top: 1px solid #F3F4F6; background: white; border-radius: 0 0 12px 12px; margin-top: 20px; overflow: hidden; }
  .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; }
  .bnav-item span { font-size: 10px; font-weight: 500; color: #9CA3AF; }
  .bnav-item.active span { color: #7C3AED; }
  .bnav-item svg { color: #9CA3AF; }
  .bnav-item.active svg { color: #7C3AED; }

  /* Feed filter tabs */
  .filter-tabs { display: flex; gap: 6px; background: #F9FAFB; padding: 4px; border-radius: 10px; margin-top: 16px; }
  .tab { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: #6B7280; cursor: pointer; }
  .tab.active { background: white; color: #111827; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
</style>
</head>
<body>
  <h3>Top Navigation (Desktop)</h3>
  <div class="topnav">
    <div class="nav-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
      HAVEN
    </div>
    <span class="nav-link">Feed</span>
    <span class="nav-link active">Grow</span>
    <span class="nav-link">Connect</span>
    <span class="nav-link">Circle</span>
    <span class="nav-link">Safe Space</span>
    <div class="nav-actions">
      <div class="icon-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
      <div class="icon-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></div>
      <div class="avatar-sm">H</div>
    </div>
  </div>

  <h3 style="margin-top:20px;">Bottom Navigation (Mobile)</h3>
  <div style="width:375px;border:1px solid #F3F4F6;border-radius:12px;overflow:hidden;">
    <div class="bottomnav">
      <div class="bnav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </div>
      <div class="bnav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Grow</span>
      </div>
      <div class="bnav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Circle</span>
      </div>
      <div class="bnav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        <span>Safe Space</span>
      </div>
      <div class="bnav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Me</span>
      </div>
    </div>
  </div>

  <h3 style="margin-top:20px;">Feed Filter Tabs</h3>
  <div class="filter-tabs" style="width:fit-content;">
    <span class="tab active">All</span>
    <span class="tab" style="color:#4C1D95;">Grow</span>
    <span class="tab" style="color:#065F46;">Connect</span>
    <span class="tab" style="color:#78350F;">Circle</span>
    <span class="tab" style="color:#9F1239;">Safe Space</span>
  </div>
</body>
</html>

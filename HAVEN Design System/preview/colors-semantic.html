<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: white; font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; flex: 1; }
  .dot { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; }
  .label { font-size: 11px; font-weight: 500; }
  .sublabel { font-size: 10px; opacity: .6; font-family: var(--font-mono); }
  h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #999; margin: 0 0 8px; }
</style>
</head>
<body>
  <h3>Semantic States</h3>
  <div class="row">
    <div class="chip" style="background:#F5F3FF;">
      <div class="dot" style="background:#7C3AED;"></div>
      <div><div class="label" style="color:#4C1D95;">Primary / Action</div><div class="sublabel">#7C3AED purple-600</div></div>
    </div>
    <div class="chip" style="background:#F0FDF4;">
      <div class="dot" style="background:#10B981;"></div>
      <div><div class="label" style="color:#065F46;">Success / Joined</div><div class="sublabel">#10B981 emerald-500</div></div>
    </div>
  </div>
  <div class="row">
    <div class="chip" style="background:#FFF7ED;">
      <div class="dot" style="background:#F59E0B;"></div>
      <div><div class="label" style="color:#92400E;">Warning / Medium Risk</div><div class="sublabel">#F59E0B amber-400</div></div>
    </div>
    <div class="chip" style="background:#FFF1F2;">
      <div class="dot" style="background:#EF4444;"></div>
      <div><div class="label" style="color:#991B1B;">Destructive / High Risk</div><div class="sublabel">#EF4444 red-500</div></div>
    </div>
  </div>
  <h3 style="margin-top:12px;">Risk Levels (Wellbeing)</h3>
  <div class="row">
    <div class="chip" style="background:#F3F4F6; border:1px solid #E5E7EB;">
      <div class="dot" style="background:#D1D5DB;"></div>
      <div><div class="label" style="color:#374151;">None</div><div class="sublabel">risk_level: none</div></div>
    </div>
    <div class="chip" style="background:#FEF9C3;">
      <div class="dot" style="background:#EAB308;"></div>
      <div><div class="label" style="color:#713F12;">Low</div><div class="sublabel">risk_level: low</div></div>
    </div>
    <div class="chip" style="background:#FFF7ED;">
      <div class="dot" style="background:#F97316;"></div>
      <div><div class="label" style="color:#7C2D12;">Medium</div><div class="sublabel">risk_level: medium</div></div>
    </div>
    <div class="chip" style="background:#FFF1F2;">
      <div class="dot" style="background:#EF4444;"></div>
      <div><div class="label" style="color:#991B1B;">High</div><div class="sublabel">risk_level: high</div></div>
    </div>
  </div>
</body>
</html>

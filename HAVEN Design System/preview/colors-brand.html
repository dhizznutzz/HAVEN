<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: white; font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: stretch; }
  .swatch { flex: 1; border-radius: 10px; padding: 14px 12px; }
  .swatch-label { font-size: 11px; font-weight: 500; margin-top: 6px; }
  .swatch-hex { font-size: 10px; font-family: var(--font-mono); opacity: .65; }
  .wordmark { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .wordmark span { font-size: 18px; font-weight: 600; color: #111; }
  h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #999; margin: 0 0 8px; }
</style>
</head>
<body>
  <div class="wordmark">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4E7A56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/>
      <path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
      <path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
    </svg>
    <span>HAVEN</span>
  </div>

  <h3>Primary Brand — Sage Green</h3>
  <div class="row">
    <div class="swatch" style="background:#EEF3EC; border:1px solid #D4E8CE;">
      <div class="swatch-label" style="color:#1C3820;">50</div>
      <div class="swatch-hex">#EEF3EC</div>
    </div>
    <div class="swatch" style="background:#D4E8CE;">
      <div class="swatch-label" style="color:#1C3820;">100</div>
      <div class="swatch-hex">#D4E8CE</div>
    </div>
    <div class="swatch" style="background:#7FAD82;">
      <div class="swatch-label" style="color:#fff;">400</div>
      <div class="swatch-hex" style="color:#ddd;">#7FAD82</div>
    </div>
    <div class="swatch" style="background:#4E7A56;">
      <div class="swatch-label" style="color:#fff;">600 — Brand</div>
      <div class="swatch-hex" style="color:#bde0c0;">#4E7A56</div>
    </div>
    <div class="swatch" style="background:#3C6142;">
      <div class="swatch-label" style="color:#fff;">700 — Hover</div>
      <div class="swatch-hex" style="color:#aad0ae;">#3C6142</div>
    </div>
    <div class="swatch" style="background:#1C3820;">
      <div class="swatch-label" style="color:#fff;">900 — Text</div>
      <div class="swatch-hex" style="color:#7fad82;">#1C3820</div>
    </div>
  </div>

  <h3>Neutrals</h3>
  <div class="row">
    <div class="swatch" style="background:#F9FAFB; border:1px solid #eee;">
      <div class="swatch-label">gray-50</div>
      <div class="swatch-hex">#F9FAFB</div>
    </div>
    <div class="swatch" style="background:#F3F4F6; border:1px solid #eee;">
      <div class="swatch-label">gray-100</div>
      <div class="swatch-hex">#F3F4F6</div>
    </div>
    <div class="swatch" style="background:#E5E7EB;">
      <div class="swatch-label">gray-200</div>
      <div class="swatch-hex">#E5E7EB</div>
    </div>
    <div class="swatch" style="background:#9CA3AF;">
      <div class="swatch-label" style="color:#fff;">gray-400</div>
      <div class="swatch-hex" style="color:#eee;">#9CA3AF</div>
    </div>
    <div class="swatch" style="background:#374151;">
      <div class="swatch-label" style="color:#fff;">gray-700</div>
      <div class="swatch-hex" style="color:#aaa;">#374151</div>
    </div>
    <div class="swatch" style="background:#111827;">
      <div class="swatch-label" style="color:#fff;">gray-900</div>
      <div class="swatch-hex" style="color:#888;">#111827</div>
    </div>
  </div>
</body>
</html>

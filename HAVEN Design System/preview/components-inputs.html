<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #F9FAFB; font-family: var(--font-sans); }
  .group { margin-bottom: 16px; }
  h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #999; margin: 0 0 8px; }
  input, textarea { width: 100%; box-sizing: border-box; border: 1.5px solid #E5E7EB; border-radius: 12px; padding: 10px 12px; font-size: 13px; font-family: var(--font-sans); color: #111827; background: white; outline: none; transition: border-color .15s; }
  input:focus, textarea:focus { border-color: #7C3AED; }
  input::placeholder, textarea::placeholder { color: #9CA3AF; }
  textarea { resize: none; height: 80px; line-height: 1.6; }
  .input-wrap { position: relative; }
  .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }
  .input-padded { padding-left: 36px; }
</style>
</head>
<body>
  <div class="group">
    <h3>Text Input</h3>
    <input type="text" placeholder="Your username">
  </div>
  <div class="group">
    <h3>With Icon</h3>
    <div class="input-wrap">
      <span class="input-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input type="text" class="input-padded" placeholder="Search posts, skills, people…">
    </div>
  </div>
  <div class="group">
    <h3>Focused State</h3>
    <input type="text" style="border-color:#7C3AED;" value="hafiz_codes">
  </div>
  <div class="group">
    <h3>Textarea</h3>
    <textarea placeholder="What's on your mind? Share a win, a learning, or ask for support…"></textarea>
  </div>
</body>
</html>

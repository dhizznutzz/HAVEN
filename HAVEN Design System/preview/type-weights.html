<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: white; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid #F3F4F6; }
  .row:last-child { border: none; }
  .meta { font-size: 10px; color: #9CA3AF; font-family: var(--font-mono); min-width: 80px; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">400 Regular</div>
    <div style="font-size:15px;font-weight:400;color:#374151;">The algorithm optimises for your growth, not your screen time.</div>
  </div>
  <div class="row">
    <div class="meta">500 Medium</div>
    <div style="font-size:15px;font-weight:500;color:#111827;">Four pillars. One platform.</div>
  </div>
  <div class="row">
    <div class="meta">600 Semibold</div>
    <div style="font-size:15px;font-weight:600;color:#111827;">HAVEN</div>
  </div>
  <div class="row">
    <div class="meta">700 Bold</div>
    <div style="font-size:15px;font-weight:700;color:#111827;">Grow Together</div>
  </div>
  <div class="row" style="margin-top:4px;">
    <div class="meta">tight −0.025</div>
    <div style="font-size:24px;font-weight:500;letter-spacing:-0.025em;color:#111827;">Tumbuh — Grow Together</div>
  </div>
  <div class="row">
    <div class="meta">normal 0</div>
    <div style="font-size:24px;font-weight:500;letter-spacing:0;color:#111827;">Tumbuh — Grow Together</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: white; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .pillar { border-radius: 12px; padding: 16px; border: 1.5px solid transparent; }
  .pillar-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .pillar-desc { font-size: 10px; opacity: .7; }
  .swatches { display: flex; gap: 4px; margin-top: 10px; }
  .sw { height: 20px; flex: 1; border-radius: 4px; }
  .sw-label { font-size: 9px; text-align: center; margin-top: 2px; font-family: var(--font-mono); opacity: .6; }
</style>
</head>
<body>
  <div class="grid">
    <!-- Grow -->
    <div class="pillar" style="background:#F5F3FF; border-color:#DDD6FE;">
      <div style="width:32px;height:32px;border-radius:8px;background:#EDE9FE;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6D28D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
      </div>
      <div class="pillar-name" style="color:#4C1D95;">Grow</div>
      <div class="pillar-desc" style="color:#5B21B6;">Skills · Challenges · XP</div>
      <div class="swatches">
        <div><div class="sw" style="background:#EEEDFE;"></div><div class="sw-label">light</div></div>
        <div><div class="sw" style="background:#7F77DD;"></div><div class="sw-label">mid</div></div>
        <div><div class="sw" style="background:#534AB7;"></div><div class="sw-label">dark</div></div>
        <div><div class="sw" style="background:#3C3489;"></div><div class="sw-label">text</div></div>
      </div>
    </div>

    <!-- Connect -->
    <div class="pillar" style="background:#F0FDF4; border-color:#BBF7D0;">
      <div style="width:32px;height:32px;border-radius:8px;background:#D1FAE5;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#065F46" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="pillar-name" style="color:#065F46;">Connect</div>
      <div class="pillar-desc" style="color:#047857;">Volunteer · Intern · Events</div>
      <div class="swatches">
        <div><div class="sw" style="background:#E1F5EE;"></div><div class="sw-label">light</div></div>
        <div><div class="sw" style="background:#1D9E75;"></div><div class="sw-label">mid</div></div>
        <div><div class="sw" style="background:#0F6E56;"></div><div class="sw-label">dark</div></div>
        <div><div class="sw" style="background:#085041;"></div><div class="sw-label">text</div></div>
      </div>
    </div>

    <!-- Circle -->
    <div class="pillar" style="background:#FFFBEB; border-color:#FDE68A;">
      <div style="width:32px;height:32px;border-radius:8px;background:#FEF3C7;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#92400E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="pillar-name" style="color:#78350F;">Circle</div>
      <div class="pillar-desc" style="color:#92400E;">Groups · Study · Mentors</div>
      <div class="swatches">
        <div><div class="sw" style="background:#FAEEDA;"></div><div class="sw-label">light</div></div>
        <div><div class="sw" style="background:#BA7517;"></div><div class="sw-label">mid</div></div>
        <div><div class="sw" style="background:#854F0B;"></div><div class="sw-label">dark</div></div>
        <div><div class="sw" style="background:#633806;"></div><div class="sw-label">text</div></div>
      </div>
    </div>

    <!-- Safe Space -->
    <div class="pillar" style="background:#FFF1F2; border-color:#FECDD3;">
      <div style="width:32px;height:32px;border-radius:8px;background:#FFE4E6;display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9F1239" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </div>
      <div class="pillar-name" style="color:#9F1239;">Safe Space</div>
      <div class="pillar-desc" style="color:#BE123C;">Anonymous · AI · Counselors</div>
      <div class="swatches">
        <div><div class="sw" style="background:#FAECE7;"></div><div class="sw-label">light</div></div>
        <div><div class="sw" style="background:#D85A30;"></div><div class="sw-label">mid</div></div>
        <div><div class="sw" style="background:#993C1D;"></div><div class="sw-label">dark</div></div>
        <div><div class="sw" style="background:#712B13;"></div><div class="sw-label">text</div></div>
      </div>
    </div>
  </div>
</body>
</html>
